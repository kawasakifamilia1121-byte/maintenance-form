<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>状態確認フォーム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .header {
    background: #00B900;
    color: #fff;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 { font-size: 16px; font-weight: 600; }

  .form-container {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: #00B900;
    letter-spacing: 0.05em;
    padding-bottom: 10px;
    border-bottom: 1.5px solid #e8f5e9;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }

  .field label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .required {
    background: #ff4444;
    color: #fff;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 500;
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    background: #fafafa;
    color: #333;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: #00B900;
    background: #fff;
  }

  .field textarea {
    min-height: 100px;
    resize: vertical;
    line-height: 1.6;
  }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
    pointer-events: none;
    font-size: 14px;
  }
  .select-wrap select { padding-right: 32px; }

  .submit-btn {
    background: #00B900;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    width: 100%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  .submit-btn:active { transform: scale(0.98); background: #009900; }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #333;
    color: #fff;
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 14px;
    white-space: nowrap;
    transition: transform 0.3s ease;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #00B900; }
  .toast.error { background: #e53935; }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 200;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #e0e0e0;
    border-top-color: #00B900;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: #555; }

  .info-box {
    background: #e8f5e9;
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: #444;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="header">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 11l3 3L22 4"/>
    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
  </svg>
  <h1>状態確認フォーム</h1>
</div>

<div class="form-container">

  <div class="info-box">
    📋 倉庫で商品の状態を確認後、以下のフォームに入力してください。
  </div>

  <!-- 伝票番号 -->
  <div class="card">
    <div class="card-title">対象商品の確認</div>

    <div class="field">
      <label for="ticketNo">伝票番号 <span class="required">必須</span></label>
      <input type="number" id="ticketNo" placeholder="例：1953882" inputmode="numeric">
    </div>
  </div>

  <!-- 確認結果 -->
  <div class="card">
    <div class="card-title">確認結果</div>

    <div class="field">
      <label for="result">確認後の結果 <span class="required">必須</span></label>
      <textarea id="result" placeholder="例：現場で確認、持ち帰りメンテ後出荷"></textarea>
    </div>

    <div class="field">
      <label for="status">改善状況 <span class="required">必須</span></label>
      <div class="select-wrap">
        <select id="status">
          <option value="">選択してください</option>
          <option>改善済み</option>
          <option>故障</option>
        </select>
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="submitForm()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    スプレッドシートに記録する
  </button>

</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">記録中...</div>
</div>

<div class="toast" id="toast"></div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwbq-8xp2WO8KrsrYy_pDrT-80VZEd7MesnnOwbbfewdF1SvsYw9hJ1rCHkyZfDu2GHeg/exec';

  function validate() {
    const required = [
      { id: 'ticketNo', label: '伝票番号' },
      { id: 'result',   label: '確認後の結果' },
      { id: 'status',   label: '改善状況' },
    ];
    for (const f of required) {
      if (!document.getElementById(f.id).value.trim()) {
        showToast(`「${f.label}」を入力してください`, 'error');
        return false;
      }
    }
    return true;
  }

  async function submitForm() {
    if (!validate()) return;

    const btn = document.querySelector('.submit-btn');
    btn.disabled = true;
    document.getElementById('loadingOverlay').style.display = 'flex';

    const data = {
      formType:  'status',
      ticketNo:  document.getElementById('ticketNo').value,
      result:    document.getElementById('result').value,
      status:    document.getElementById('status').value,
    };

    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify(data),
      });
      const result = await res.json();

      document.getElementById('loadingOverlay').style.display = 'none';

      if (result.success) {
        showToast('✅ 記録しました！', 'success');
        setTimeout(() => {
          document.getElementById('ticketNo').value = '';
          document.getElementById('result').value = '';
          document.getElementById('status').value = '';
          btn.disabled = false;
        }, 2000);
      } else {
        throw new Error(result.message || '送信に失敗しました');
      }
    } catch (err) {
      document.getElementById('loadingOverlay').style.display = 'none';
      btn.disabled = false;
      showToast('❌ ' + err.message, 'error');
    }
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
