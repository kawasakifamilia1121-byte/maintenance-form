<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>メンテナンス報告フォーム</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .header {
    background: #00B900;
    color: #fff;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header svg { width: 22px; height: 22px; flex-shrink: 0; }
  .header h1 { font-size: 16px; font-weight: 600; }

  .form-container {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: #00B900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding-bottom: 10px;
    border-bottom: 1.5px solid #e8f5e9;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }

  .field label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .required {
    background: #ff4444;
    color: #fff;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 500;
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    background: #fafafa;
    color: #333;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: #00B900;
    background: #fff;
  }

  .field textarea {
    min-height: 80px;
    resize: vertical;
    line-height: 1.6;
  }

  .select-wrap {
    position: relative;
  }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
    pointer-events: none;
    font-size: 14px;
  }
  .select-wrap select { padding-right: 32px; }

  .type-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .type-btn {
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px 4px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    background: #fafafa;
    color: #666;
    transition: all 0.15s;
  }
  .type-btn.active {
    border-color: #00B900;
    background: #e8f5e9;
    color: #00B900;
  }
  .type-btn span { display: block; font-size: 18px; margin-bottom: 3px; }

  .submit-btn {
    background: #00B900;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    width: 100%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  .submit-btn:active { transform: scale(0.98); background: #009900; }
  .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #333;
    color: #fff;
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 14px;
    white-space: nowrap;
    transition: transform 0.3s ease;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #00B900; }
  .toast.error { background: #e53935; }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 200;
    display: none;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #e0e0e0;
    border-top-color: #00B900;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: #555; }
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
    <rect x="9" y="3" width="6" height="4" rx="1"/>
    <line x1="9" y1="12" x2="15" y2="12"/>
    <line x1="9" y1="16" x2="13" y2="16"/>
  </svg>
  <h1>メンテナンス報告</h1>
</div>

<div class="form-container">

  <!-- 種別 -->
  <div class="card">
    <div class="card-title">報告種別</div>
    <div class="field">
      <label>種別 <span class="required">必須</span></label>
      <div class="type-grid">
        <div class="type-btn active" data-value="修理" onclick="selectType(this)">
          <span>🔧</span>修理
        </div>
        <div class="type-btn" data-value="交換" onclick="selectType(this)">
          <span>🔄</span>交換
        </div>
        <div class="type-btn" data-value="点検" onclick="selectType(this)">
          <span>🔍</span>点検
        </div>
      </div>
      <input type="hidden" id="reportType" value="修理">
    </div>
  </div>

  <!-- 基本情報 -->
  <div class="card">
    <div class="card-title">基本情報</div>

    <div class="field">
      <label for="ticketNo">伝票番号 <span class="required">必須</span></label>
      <input type="number" id="ticketNo" placeholder="例：1953882" inputmode="numeric">
    </div>

    <div class="field">
      <label for="productName">商品名 <span class="required">必須</span></label>
      <input type="text" id="productName" placeholder="例：冷蔵庫112、洗濯機4.2K">
    </div>

    <div class="field">
      <label for="detail">詳細・理由 <span class="required">必須</span></label>
      <input type="text" id="detail" placeholder="例：冷えない、電源が入らない">
    </div>
  </div>

  <!-- 担当情報 -->
  <div class="card">
    <div class="card-title">担当情報</div>

    <div class="field">
      <label for="staff">担当者 <span class="required">必須</span></label>
      <div class="select-wrap">
        <select id="staff">
          <option value="">選択してください</option>
          <option>森下</option>
          <option>田中</option>
          <option>吉垣</option>
          <option>西野</option>
          <option>太田</option>
          <option>西山</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="driver">配送員</label>
      <div class="select-wrap">
        <select id="driver">
          <option value="">選択してください</option>
          <option>森下</option>
          <option>田中</option>
          <option>吉垣</option>
          <option>西野</option>
          <option>太田</option>
          <option>西山</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 追加情報 -->
  <div class="card">
    <div class="card-title">追加情報</div>

    <div class="field">
      <label for="modelNo">型番</label>
      <input type="text" id="modelNo" placeholder="例：GJ-912">
    </div>

    <div class="field">
      <label for="year">年式</label>
      <input type="number" id="year" placeholder="例：2025" inputmode="numeric">
    </div>

    <div class="field">
      <label for="note">備考</label>
      <textarea id="note" placeholder="その他、補足情報があれば記入してください"></textarea>
    </div>
  </div>

  <button class="submit-btn" onclick="submitForm()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    スプレッドシートに記録する
  </button>

</div>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">記録中...</div>
</div>

<!-- トースト通知 -->
<div class="toast" id="toast"></div>

<script>
  // ▼ ここを設定してください
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwbq-8xp2WO8KrsrYy_pDrT-80VZEd7MesnnOwbbfewdF1SvsYw9hJ1rCHkyZfDu2GHeg/exec';
  const LIFF_ID = '2010056504-TIgOymoB';   // LINE DevelopersのLIFF ID

  let userName = '';
  let userId = '';

  // LIFF初期化
  liff.init({ liffId: LIFF_ID })
    .then(() => {
      if (liff.isLoggedIn()) {
        liff.getProfile().then(profile => {
          userName = profile.displayName;
          userId = profile.userId;
        });
      }
    })
    .catch(err => console.warn('LIFF init error:', err));

  // 種別選択
  function selectType(el) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('reportType').value = el.dataset.value;
  }

  // バリデーション
  function validate() {
    const required = [
      { id: 'ticketNo', label: '伝票番号' },
      { id: 'productName', label: '商品名' },
      { id: 'detail', label: '詳細・理由' },
      { id: 'staff', label: '担当者' },
    ];
    for (const f of required) {
      if (!document.getElementById(f.id).value.trim()) {
        showToast(`「${f.label}」を入力してください`, 'error');
        document.getElementById(f.id).focus();
        return false;
      }
    }
    return true;
  }

  // フォーム送信
  async function submitForm() {
    if (!validate()) return;

    const btn = document.querySelector('.submit-btn');
    btn.disabled = true;
    document.getElementById('loadingOverlay').style.display = 'flex';

    const data = {
      reportType: document.getElementById('reportType').value,
      ticketNo:   document.getElementById('ticketNo').value,
      productName:document.getElementById('productName').value,
      detail:     document.getElementById('detail').value,
      staff:      document.getElementById('staff').value,
      driver:     document.getElementById('driver').value,
      modelNo:    document.getElementById('modelNo').value,
      year:       document.getElementById('year').value,
      note:       document.getElementById('note').value,
      userName:   userName,
      userId:     userId,
    };

    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify(data),
      });
      const result = await res.json();

      document.getElementById('loadingOverlay').style.display = 'none';

      if (result.success) {
        showToast('✅ 記録しました！', 'success');
        setTimeout(() => liff.closeWindow(), 2000);
      } else {
        throw new Error(result.message || '送信に失敗しました');
      }
    } catch (err) {
      document.getElementById('loadingOverlay').style.display = 'none';
      btn.disabled = false;
      showToast('❌ ' + err.message, 'error');
    }
  }

  // トースト表示
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
